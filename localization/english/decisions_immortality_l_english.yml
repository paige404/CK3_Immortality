l_english:
  immortality_decision: "Immortality"
  immortality_decision_tooltip: "This decision adds a trait that makes you immortal."
  immortality_decision_desc: "Leave death and aging behind?"
  immortality_decision_effect_tooltip: "The choice to become immortal lies before you"
  immortality_decision_confirm: "Yes."

  immortality_removal_decision: "Giving up your immortality"
  immortality_removal_decision_tooltip: "This decision will let you move on from this mortal coil in a natural way once more."
  immortality_removal_decision_desc: "Perhaps it's finally time to give up your eternal life?"
  immortality_removal_decision_effect_tooltip: "Is it time to move on?"
  immortality_removal_decision_confirm: "Yes, I'm ready now."

  new_invasion_decision: "Plan a new invasion"
  new_invasion_decision_tooltip: "This decision will let you invade for a kingdom once again."
  new_invasion_decision_desc: "Are you ready to set out for grand conquests once more?"
  new_invasion_decision_effect_tooltip: "You and your armies stand ready to set out on another grand campaign."
  new_invasion_decision_confirm: "For honor and glory!"

  set_age_decision: "Choosing an age"
  set_age_decision_tooltip: "This decision will let you choose how old you wish to appear while immortal."
  set_age_decision_desc: "Tired of the same old look?"
  set_age_decision_effect_tooltip: "You already used your control over age to freeze your own, why not move it forward or backwards a bit while you're at it?"
  set_age_decision_confirm: "I've already frozen my age, why stop there?"

  restore_body_decision: "Restore your body and mind"
  restore_body_decision_tooltip: "This decision will remove all negative health effects from you, such as diseases or wounds."
  restore_body_decision_desc: "You can stop your body aging, why not restore it as well?"
  restore_body_decision_effect_tooltip: "Heal your body and mind with the power of... something."
  restore_body_decision_confirm: "Why wouldn't I want to be healthy?"

  new_faith_creation_decision: "Prepare to create a new faith"
  new_faith_creation_decision_tooltip: "This decision will let you create a new faith once again."
  new_faith_creation_decision_desc: "Are you ready to enlighten your people once more?"
  new_faith_creation_decision_effect_tooltip: "You feel prepared to create a new religion again."
  new_faith_creation_decision_confirm: "Behold!"

  renegotiate_contract_decision: "Prepare to renegotiate your vassalage"
  renegotiate_contract_decision_tooltip: "This decision will let you modify your feudal contract once again."
  renegotiate_contract_decision_desc: "Modifying your feudal contract from time to time is only your right as an immortal."
  renegotiate_contract_decision_effect_tooltip: "You feel empowered to modify your vassal contract again."
  renegotiate_contract_decision_confirm: "Now to have a chat with my lord..."

  decision_group_type_immortality_decision_group: "Immortality Decisions"
