l_spanish:
  immortality_decision: "Inmortalidad"
  immortality_decision_tooltip: "Esta decisión añade un rasgo que te hace inmortal."
  immortality_decision_desc: "¿Dejar atrás la muerte y el envejecimiento?"
  immortality_decision_effect_tooltip: "La elección de volverte inmortal está ante ti"
  immortality_decision_confirm: "Sí."

  immortality_removal_decision: "Renunciar a tu inmortalidad"
  immortality_removal_decision_tooltip: "Esta decisión te permitirá abandonar esta vida mortal de nuevo de forma natural."
  immortality_removal_decision_desc: "¿Quizás es el momento"
  immortality_removal_decision_effect_tooltip: "¿Es hora de seguir adelante?"
  immortality_removal_decision_confirm: "Sí, estoy listo ahora."

  new_invasion_decision: "Planificar una nueva invasión"
  new_invasion_decision_tooltip: "Esta decisión te permitirá invadir un reino una vez más."
  new_invasion_decision_desc: "¿Estás listo para emprender grandes conquistas una vez más?"
  new_invasion_decision_effect_tooltip: "Tú y tus ejércitos estáis listos para emprender otra gran campaña."
  new_invasion_decision_confirm: "¡Por el honor y la gloria!"

  set_age_decision: "Elegir una edad"
  set_age_decision_tooltip: "Esta decisión te permitirá elegir cuántos años deseas aparentar mientras eres inmortal."
  set_age_decision_desc: "¿Cansado de la misma apariencia?"
  set_age_decision_effect_tooltip: "Ya has usado tu control sobre la edad para congelar la tuya, ¿por qué no avanzarla o retrocederla un poco mientras estás en ello?"
  set_age_decision_confirm: "Ya he congelado mi edad, ¿por qué detenerme ahí?"

  restore_body_decision: "Restaurar"
  restore_body_decision_tooltip: "Esta decisión eliminará todos los efectos negativos de salud de ti, como enfermedades o heridas."
  restore_body_decision_desc: "Puedes detener el envejecimiento de tu cuerpo, ¿por qué no restaurarlo también?"
  restore_body_decision_effect_tooltip: "Cura tu cuerpo y mente con el poder de... algo."
  restore_body_decision_confirm: "¿Por qué no querría estar sano?"

  new_faith_creation_decision: "Prepararse para crear una nueva fe"
  new_faith_creation_decision_tooltip: "Esta decisión te permitirá crear una nueva fe una vez más."
  new_faith_creation_decision_desc: "¿Estás listo para iluminar a tu pueblo una vez más?"
  new_faith_creation_decision_effect_tooltip: "Te sientes preparado para crear una nueva religión de nuevo."
  new_faith_creation_decision_confirm: "¡He aquí!"

  renegotiate_contract_decision: "Prepararse para renegociar tu vasallaje"
  renegotiate_contract_decision_tooltip: "Esta decisión te permitirá modificar tu contrato feudal una vez más."
  renegotiate_contract_decision_desc: "Modificar tu contrato feudal de vez en cuando es solo tu derecho como inmortal."
  renegotiate_contract_decision_effect_tooltip: "Te sientes empoderado para modificar tu contrato de vasallaje de nuevo."
  renegotiate_contract_decision_confirm: "Ahora a tener una charla con mi señor..."
