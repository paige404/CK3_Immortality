l_russian:
  immortality_decision: "Бессмертие"
  immortality_decision_tooltip: "Это решение добавляет черту, делающую вас бессмертным."
  immortality_decision_desc: "Оставить смерть и старение позади?"
  immortality_decision_effect_tooltip: "Выбор стать бессмертным лежит перед вами"
  immortality_decision_confirm: "Да."

  immortality_removal_decision: "Отказаться от своего бессмертия"
  immortality_removal_decision_tooltip: "Это решение позволит вам снова естественным образом покинуть этот бренный мир."
  immortality_removal_decision_desc: "Может быть, наконец пришло время отказаться от вечной жизни?"
  immortality_removal_decision_effect_tooltip: "Пришло время двигаться дальше?"
  immortality_removal_decision_confirm: "Да, я готов стать смертным сейчас."

  new_invasion_decision: "Сбросить счетчик вторжения в королевство"
  new_invasion_decision_tooltip: "Это решение позволит вам снова вторгнуться в королевство."
  new_invasion_decision_desc: "Готовы ли вы снова отправиться на грандиозные завоевания еще разок?"
  new_invasion_decision_effect_tooltip: "Вы и ваши армии готовы отправиться в новую грандиозную кампанию."
  new_invasion_decision_confirm: "За честь и славу!"

  set_age_decision: "Выбор возраста"
  set_age_decision_tooltip: "Это решение позволит вам выбрать, насколько лет вы хотите выглядеть."
  set_age_decision_desc: "Устали от того же возраста?"
  set_age_decision_effect_tooltip: "Вы уже использовали свой контроль над возрастом, чтобы заморозить свой собственный, почему бы не сдвинуть его немного вперед или назад?"
  set_age_decision_confirm: "Изменить возраст"

  restore_body_decision: "Восстановить свое тело и разум"
  restore_body_decision_tooltip: "Это решение снимет с вас все негативные эффекты здоровья, такие как болезни или раны."
  restore_body_decision_desc: "Вы можете остановить старение своего тела, почему бы не восстановить его?"
  restore_body_decision_effect_tooltip: "Исцели свое тело и разум силой... чего-то."
  restore_body_decision_confirm: "Исцелиться"

  new_faith_creation_decision: "Сбросить счетчик создания религии"
  new_faith_creation_decision_tooltip: "Это решение позволит вам снова создать новую веру."
  new_faith_creation_decision_desc: "Готовы ли вы просветить свой народ еще раз?"
  new_faith_creation_decision_effect_tooltip: "Вы чувствуете себя готовым снова создать новую религию."
  new_faith_creation_decision_confirm: "Да"

  renegotiate_contract_decision: "Сбросить счетчик изменения вашего вассалитета"
  renegotiate_contract_decision_tooltip: "Это решение позволит вам еще раз изменить ваш феодальный договор."
  renegotiate_contract_decision_desc: "Время от времени изменять ваш феодальный договор — это только ваше право как бессмертного."
  renegotiate_contract_decision_effect_tooltip: "Вы чувствуете себя вправе снова изменить ваш вассальный договор."
  renegotiate_contract_decision_confirm: "Пришло время поговорить с моим лордом..."
