l_german:
  immortality_decision: "Unsterblichkeit"
  immortality_decision_tooltip: "Diese Entscheidung fügt eine Eigenschaft hinzu, die dich unsterblich macht."
  immortality_decision_desc: "Willst du den Tod und das Altern hinter dir lassen?"
  immortality_decision_effect_tooltip: "Die Entscheidung, unsterblich zu werden, liegt vor dir."
  immortality_decision_confirm: "Ja."

  immortality_removal_decision: "Willst du deine Unsterblichkeit aufgeben?"
  immortality_removal_decision_tooltip: "Diese Entscheidung erlaubt es dir, in deine sterbliche Hülle zurückzukehren."
  immortality_removal_decision_desc: "Vielleicht ist es endlich Zeit deine Unsterblichkeit aufzugeben?"
  immortality_removal_decision_effect_tooltip: "Ist es an der Zeit deine Unsterblichkeit zu überwinden?" #not completly sure how to translate this perfectly
  immortality_removal_decision_confirm: "Ja, ich bin jetzt bereit."

  new_invasion_decision: "Plane eine neue Invasion"
  new_invasion_decision_tooltip: "Diese Entscheidung erlaubt es dir erneut in ein Königreich einzufallen."
  new_invasion_decision_desc: "Bist du bereit, wieder einmal zu großen Eroberungen aufzubrechen?"
  new_invasion_decision_effect_tooltip: "Deine Armeen und du sind bereit, zu einem weiteren großen Feldzug aufzubrechen."
  new_invasion_decision_confirm: "Für Ehre und Ruhm!"

  set_age_decision: "Ein Alter auswählen"
  set_age_decision_tooltip: "Mit dieser Entscheidung kannst du festlegen, wie alt du werden willst, wenn du unsterblich bist."
  set_age_decision_desc: "Bist du des alten Aussehens überdrüssig?"
  set_age_decision_effect_tooltip: "Du hast deine Kontrolle über das Altern schon eingesetzt um dich einzufrieren. Wieso solltest du es also nicht ein bisschen nach vorne oder hinten verschieben?"
  set_age_decision_confirm: "Ich hab mein Alter bereits eingefroren, wieso sollte ich hier als aufhören?"

  restore_body_decision: "Körper und Geist wiederherstellen"
  restore_body_decision_tooltip: "Diese Entscheidung entfernt alle negativen Gesundheitsmali, wie Krankheiten oder Wunden."
  restore_body_decision_desc: "Wenn du den Altersprozess deines Körpers aufhalten kannst, wieso solltest du ihn dann nicht auch heilen können?"
  restore_body_decision_effect_tooltip: "Heile deinen Körper und deinen Geist mit der Kraft von... etwas."
  restore_body_decision_confirm: "Warum sollte ich nicht gesund sein wollen?"

  new_faith_creation_decision: "Bereite dich darauf vor, einen neuen Glauben zu schaffen"
  new_faith_creation_decision_tooltip: "Mit dieser Entscheidung kannst du wieder einen neuen Glauben schaffen."
  new_faith_creation_decision_desc: "Bist du bereit dein Volk noch einmal zu erleuchten?"
  new_faith_creation_decision_effect_tooltip: "Du fühlst dich bereit, wieder eine neue Religion zu gründen."
  new_faith_creation_decision_confirm: "Seht her!"
