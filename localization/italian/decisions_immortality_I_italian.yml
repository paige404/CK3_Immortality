l_italian:
  immortality_decision: "Immortalità"
  immortality_decision_tooltip: "Questa decisione aggiunge un tratto che vi rende immortali."
  immortalitu_decision_desc: "Lasciarsi alle spalle la morte e l'invecchiamento?"
  immortality_decision_effect_tooltip:

  immortality_removal_decision: "Rinunciare all'immortalità"
  immortality_removal_decision_tooltip: "Questa decisione vi consentirà di lasciare nuovamente questa spoglia mortale in modo naturale."
  immortality_removal_decision_desc: "Forse è finalmente giunto il momento di rinunciare alla vostra vita eterna?"
  immortality_removal_decision_effect_tooltip: "È giunto il momento di andare avanti?"
  immortality_removal_decision_confirm: "Sì, sono pronto ora."

  new_invasion_decision: "Pianifica una nuova invasione."
  new_invasion_decision_tooltip: "Questa decision ti permetterà di invadere ancora una volta per un regno."
  new_invasion_deciion_desc: "Sei pronto a partire per ancora una volta per grandi conquiste?"
  new_invasion_decision_effect_tooltip: "Tu e i tuoi eserciti siete pronti a partire per un'altra grande campagna."
  new_invasion_decision_confirm: "Per onore e gloria!"

  set_age_decision: "Scegli un'epoca"
  set_age_decision_tooltip: "Questa decisione vi permetterà di scegliere l'età che desiderate apparire mentre siete immortali."
  set_age_decision_desc: "Stanco del solito aspetto?"
  set_age_decision_effect_tooltip: "Hai già usato il tuo controllo sull'età per congelare la tua, perché non spostarla un po' avanti o indietro mentre ci sei?"
  set_age_decision_confirm: "Ho già congelaato la mia età, perché fermarsi qui?"

  restore_body_decision: "Ripristina il tuo corpo e la tua mente"
  restore_body_decision_tooltip: "Questa decisione rimuoverà tutti gli effetti negativi sulla salute da voi, come malattie o ferite."
  restore_body_decision_desc: "Puoi fermare l'invecchiamento del tuo corpo, perché non ripristinarlo anche?"
  restore_body_decision_effect_tooltip: "Guarisci il tuo corpo e la tua mente con il potere di... qualcosa."
  restore_body_decision_confirm: "Perché non vorrei essere in salute?"

  new_faith_creation_decision: "Preparati a creare una nuova fede"
  new_faith_creation_decision_tooltip: "Questa decisione ti permetterà di creare una nuova fede ancora una volta."
  new_faith_creation_decision_desc: "Sei pronto ad illuminare di nuovo il tuo popolo?"
  new_faith_creation_decision_effect_tooltip: "Ti senti pronto a creare una nuova religione di nuovo."
  new_faith_creation_decision_confirm: "Ecco!"

  renegotiate_contract_decision: "Preparati a rinegoziare il tuo vassallaggio"
  renegotiate_contract_decision_tooltip: "Questa decisione ti permetterà di modificare il tuo contratto feudale ancora una volta."
  renegotiate_contract_decision_desc: "Modificare il tuo contratto feudale di tanto in tanto è solo un tuo diritto da immortale."
  renegotiate_contract_decision_effect_tooltip: "Ti senti autorizzato a modificare il tuo contratto di vassallo di nuovo."
  renegotiate_contract_decision_confirm: "Ora per una chiacchierata con il mio signore..."
