l_polish:
  immortality_decision: "Nieśmiertelność"
  immortality_decision_tooltip: "Ta decyzja dodaje cechę, która czyni cię nieśmiertelnym."
  immortality_decision_desc: "Zostawić śmierć i starzenie się za sobą?"
  immortality_decision_effect_tooltip: "Decyzja o zostaniu nieśmiertelnym leży przed tobą."
  immortality_decision_confirm: "Tak."

  immortality_removal_decision: "Rezygnacja z nieśmiertelności"
  immortality_removal_decision_tooltip: "Ta decyzja pozwoli ci odejść z tego śmiertelnego świata w naturalny sposób."
  immortality_removal_decision_desc: "Może nadszedł czas, aby zrezygnować z wiecznego życia?"
  immortality_removal_decision_effect_tooltip: "Czy nadszedł czas, aby odejść?"
  immortality_removal_decision_confirm: "Tak, jestem gotowy teraz."

  new_invasion_decision: "Zaplanuj nową inwazję"
  new_invasion_decision_tooltip: "Ta decyzja pozwoli ci ponownie na inwazję królestwa."
  new_invasion_decision_desc: "Czy jesteś gotowy, aby ponownie wyruszyć na wielkie podboje?"
  new_invasion_decision_effect_tooltip: "Ty i twoje armie jesteście gotowi do wyruszenia na kolejną wielką kampanię."
  new_invasion_decision_confirm: "Dla honoru i chwały!"

  set_age_decision: "Wybór wieku"
  set_age_decision_tooltip: "Ta decyzja pozwoli ci wybrać, jak stary chcesz wyglądać, będąc nieśmiertelnym."
  set_age_decision_desc: "Zmęczony tym samym starym wyglądem?"
  set_age_decision_effect_tooltip: "Już użyłeś swojej kontroli nad wiekiem, aby zatrzymać swój wiek, czemu nie przesunąć go trochę do przodu lub do tyłu?"
  set_age_decision_confirm: "Już zatrzymałem swój wiek, czemu miałbym na tym poprzestać?"

  restore_body_decision: "Przywróć swoje ciało i umysł"
  restore_body_decision_tooltip: "Ta decyzja usunie wszystkie negatywne skutki zdrowotne, takie jak choroby czy rany."
  restore_body_decision_desc: "Możesz zatrzymać starzenie się swojego ciała, czemu nie przywrócić go również?"
  restore_body_decision_effect_tooltip: "Uzdrów swoje ciało i umysł mocą... czegoś."
  restore_body_decision_confirm: "Czemu nie chciałbym być zdrowy?"

  new_faith_creation_decision: "Przygotuj się do stworzenia nowej wiary"
  new_faith_creation_decision_tooltip: "Ta decyzja pozwoli ci ponownie stworzyć nową wiarę."
  new_faith_creation_decision_desc: "Czy jesteś gotowy, aby ponownie oświecić swój lud?"
  new_faith_creation_decision_effect_tooltip: "Czujesz się gotowy, aby ponownie stworzyć nową religię."
  new_faith_creation_decision_confirm: "Oto!"

  renegotiate_contract_decision: "Przygotuj się do renegocjacji swojego wasalstwa"
  renegotiate_contract_decision_tooltip: "Ta decyzja pozwoli ci ponownie zmodyfikować swój feudalny kontrakt."
  renegotiate_contract_decision_desc: "Modyfikowanie swojego feudalnego kontraktu od czasu do czasu to tylko twoje prawo jako nieśmiertelnego."
  renegotiate_contract_decision_effect_tooltip: "Czujesz się uprawniony do ponownej modyfikacji swojego kontraktu wasalnego."
  renegotiate_contract_decision_confirm: "Czas na rozmowę z moim panem..."
